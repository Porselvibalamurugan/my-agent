<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Agent - ClawLess</title>
  <script type="module">
    import { ClawContainer } from './node_modules/clawless-sdk/dist/index.js';

    const cc = new ClawContainer('#app', {
      agent: {
        package: 'gitclaw',
        version: '1.3.2',
        entry: 'dist/index.js',
        args: ['--dir', '<home>/workspace']
      },
      env: {
        GOOGLE_API_KEY: 'YOUR_GEMINI_API_KEY_HERE',
        CLAWLESS_MODEL: 'gemini-2.0-flash'
      },
      workspace: {
        'agent.yaml': `spec_version: "0.1.0"
name: my-first-agent
version: 0.1.0
description: "A helpful agent that answers questions"
model:
  preferred: "google:gemini-2.0-flash"
  constraints:
    temperature: 0.7
    max_tokens: 4096
tools:
  - read
  - write
runtime:
  max_turns: 50
  timeout: 120
skills:
  - my-skill
tags:
  - hackathon`,
        'SOUL.md': `# Soul
## Core Identity
I am a helpful assistant. I specialize in answering questions clearly and simply.
## Communication Style
- Friendly and approachable
- Uses simple language
## Values
- Honesty
- Clarity
- Helpfulness`,
        'RULES.md': `# Rules
## Must Always
- Be polite and respectful
- Give accurate information
## Must Never
- Make up false information
- Share private data`,
        'skills/my-skill/SKILL.md': `---
name: my-skill
description: "Answers user questions helpfully"
allowed-tools: Read Write
---
# My Skill
When the user asks a question:
1. Understand what they are asking
2. Give a clear answer
3. Ask if they need more help`
      }
    });

    cc.on('ready', () => console.log('Agent ready!'));
    cc.on('error', (e) => console.error('Error:', e));
    cc.on('status', (s) => console.log('Status:', s));

    cc.start();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: white; font-family: sans-serif; }
    #app { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
</body>
</html>
