<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitAgent — AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg: #0a0a0f;
        --surface: #12121a;
        --surface2: #1a1a26;
        --border: rgba(255,255,255,0.07);
        --border2: rgba(255,255,255,0.12);
        --accent: #7c6af7;
        --accent2: #a78bfa;
        --accent-glow: rgba(124,106,247,0.25);
        --teal: #2dd4bf;
        --teal-glow: rgba(45,212,191,0.15);
        --text: #f0eeff;
        --text2: #9b97c4;
        --text3: #5f5c8a;
        --user-bubble: #1e1b3a;
        --agent-bubble: #141420;
        --radius: 16px;
        --radius-sm: 10px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 50% at 20% 10%, rgba(124,106,247,0.12) 0%, transparent 60%),
          radial-gradient(ellipse 40% 40% at 80% 80%, rgba(45,212,191,0.08) 0%, transparent 55%),
          radial-gradient(ellipse 50% 60% at 50% 50%, rgba(10,10,15,0) 0%, var(--bg) 100%);
        pointer-events: none;
        z-index: 0;
      }

      header {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,15,0.8);
        backdrop-filter: blur(20px);
      }

      .logo { display: flex; align-items: center; gap: 12px; }
      .logo-icon {
        width: 38px; height: 38px; border-radius: 10px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; box-shadow: 0 0 20px var(--accent-glow);
      }
      .logo-text {
        font-family: "Syne", sans-serif; font-weight: 800; font-size: 20px;
        letter-spacing: -0.5px;
        background: linear-gradient(90deg, var(--text) 0%, var(--accent2) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }

      .status-pill {
        display: flex; align-items: center; gap: 7px;
        padding: 6px 14px; border-radius: 50px;
        border: 1px solid var(--border2); background: var(--surface);
        font-size: 12px; color: var(--text2); font-weight: 500;
      }
      .status-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--teal); box-shadow: 0 0 8px var(--teal);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(0.85); }
      }

      .hero {
        position: relative; z-index: 5;
        text-align: center; padding: 36px 24px 24px;
      }
      .hero-tag {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 14px; border-radius: 50px;
        background: rgba(124,106,247,0.12);
        border: 1px solid rgba(124,106,247,0.3);
        font-size: 11px; font-weight: 500; color: var(--accent2);
        letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px;
      }
      .hero h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(28px, 5vw, 42px);
        font-weight: 800; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 10px;
        background: linear-gradient(135deg, #ffffff 30%, var(--accent2) 70%, var(--teal) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      .hero p { font-size: 15px; color: var(--text2); font-weight: 300; max-width: 400px; margin: 0 auto; line-height: 1.6; }

      .chat-wrapper {
        position: relative; z-index: 5; flex: 1;
        display: flex; flex-direction: column;
        max-width: 780px; width: 100%;
        margin: 0 auto; padding: 0 20px; overflow: hidden;
      }

      #chat {
        flex: 1; overflow-y: auto; padding: 8px 0 16px;
        max-height: calc(100vh - 320px);
        display: flex; flex-direction: column; gap: 14px;
        scrollbar-width: thin; scrollbar-color: var(--accent) rgba(255,255,255,0.02);
      }
      #chat::-webkit-scrollbar { width: 6px; }
      #chat::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
      #chat::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--accent) 0%, var(--teal) 100%); border-radius: 10px; }

      .msg { display: flex; gap: 12px; animation: fadeUp 0.3s ease both; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .msg.user { flex-direction: row-reverse; }

      .avatar {
        width: 34px; height: 34px; border-radius: 50%;
        flex-shrink: 0; display: flex; align-items: center;
        justify-content: center; font-size: 14px; font-weight: 600;
      }
      .avatar.agent { background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%); box-shadow: 0 0 12px var(--accent-glow); }
      .avatar.user { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }

      .bubble {
        max-width: 72%; padding: 13px 16px;
        border-radius: var(--radius); font-size: 14.5px;
        line-height: 1.7; position: relative;
      }
      .msg.agent .bubble {
        background: var(--agent-bubble); border: 1px solid var(--border);
        border-top-left-radius: 4px; color: var(--text);
      }
      .msg.user .bubble {
        background: var(--user-bubble); border: 1px solid rgba(124,106,247,0.25);
        border-top-right-radius: 4px; color: var(--text);
      }

      .bubble .sender {
        font-family: "Syne", sans-serif; font-size: 11px; font-weight: 600;
        letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px;
      }
      .msg.agent .sender { color: var(--accent2); }
      .msg.user .sender { color: var(--teal); }

      /* ── Markdown response styling ── */
      .bubble .content p { margin-bottom: 10px; }
      .bubble .content p:last-child { margin-bottom: 0; }

      .bubble .content ul,
      .bubble .content ol {
        padding-left: 20px;
        margin-bottom: 10px;
      }
      .bubble .content li { margin-bottom: 5px; }

      .bubble .content strong { color: var(--accent2); font-weight: 600; }
      .bubble .content em { color: var(--teal); font-style: italic; }

      .bubble .content h1,
      .bubble .content h2,
      .bubble .content h3 {
        font-family: "Syne", sans-serif;
        color: var(--accent2);
        margin: 12px 0 6px;
        line-height: 1.3;
      }
      .bubble .content h1 { font-size: 18px; }
      .bubble .content h2 { font-size: 16px; }
      .bubble .content h3 { font-size: 14px; }

      .bubble .content code {
        background: rgba(124,106,247,0.15);
        border: 1px solid rgba(124,106,247,0.2);
        color: var(--accent2);
        padding: 2px 7px;
        border-radius: 5px;
        font-family: 'Courier New', monospace;
        font-size: 13px;
      }

      .bubble .content pre {
        background: rgba(0,0,0,0.4);
        border: 1px solid var(--border2);
        border-radius: 10px;
        padding: 14px 16px;
        overflow-x: auto;
        margin: 10px 0;
      }
      .bubble .content pre code {
        background: transparent;
        border: none;
        padding: 0;
        color: #e2e8f0;
        font-size: 13px;
        line-height: 1.6;
      }

      .bubble .content blockquote {
        border-left: 3px solid var(--accent);
        padding-left: 12px;
        margin: 10px 0;
        color: var(--text2);
        font-style: italic;
      }

      .bubble .content a {
        color: var(--teal);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .bubble .content hr {
        border: none;
        border-top: 1px solid var(--border2);
        margin: 12px 0;
      }

      .bubble .content table {
        width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
        font-size: 13.5px;
      }
      .bubble .content th {
        background: rgba(124,106,247,0.15);
        color: var(--accent2);
        padding: 8px 12px;
        text-align: left;
        border: 1px solid var(--border2);
        font-family: "Syne", sans-serif;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .bubble .content td {
        padding: 8px 12px;
        border: 1px solid var(--border);
        color: var(--text2);
      }
      .bubble .content tr:hover td { background: rgba(255,255,255,0.02); }

      /* Typing dots */
      .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
      .typing-dots span {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--accent2);
        animation: bounce 1.2s ease-in-out infinite;
      }
      .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
      .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-6px); opacity: 1; }
      }

      .input-bar {
        position: relative; z-index: 10;
        max-width: 780px; width: 100%;
        margin: 0 auto; padding: 12px 20px 20px;
      }
      .input-container {
        display: flex; align-items: center; gap: 10px;
        background: var(--surface); border: 1px solid var(--border2);
        border-radius: 50px; padding: 8px 8px 8px 20px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .input-container:focus-within {
        border-color: rgba(124,106,247,0.5);
        box-shadow: 0 0 0 3px rgba(124,106,247,0.08), 0 0 20px rgba(124,106,247,0.1);
      }
      #prompt {
        flex: 1; background: transparent; border: none; outline: none;
        font-family: "DM Sans", sans-serif; font-size: 15px;
        color: var(--text); caret-color: var(--accent2);
      }
      #prompt::placeholder { color: var(--text3); }

      #send-btn {
        width: 40px; height: 40px; border-radius: 50%; border: none;
        background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0;
        box-shadow: 0 0 16px var(--accent-glow);
      }
      #send-btn:hover { transform: scale(1.08); box-shadow: 0 0 24px var(--accent-glow); }
      #send-btn:active { transform: scale(0.96); }
      #send-btn:disabled { opacity: 0.45; transform: none; cursor: not-allowed; }
      #send-btn svg { width: 17px; height: 17px; fill: white; }

      .hint { text-align: center; font-size: 11.5px; color: var(--text3); margin-top: 10px; letter-spacing: 0.02em; }

      .welcome { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 10px 0 4px; }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
      .chip {
        padding: 7px 16px; border-radius: 50px;
        background: var(--surface); border: 1px solid var(--border2);
        font-size: 13px; color: var(--text2); cursor: pointer;
        transition: all 0.2s; font-family: "DM Sans", sans-serif;
      }
      .chip:hover { background: var(--surface2); border-color: rgba(124,106,247,0.4); color: var(--accent2); transform: translateY(-1px); }
    </style>
  </head>
  <body>

    <header>
      <div class="logo">
        <div class="logo-icon">🤖</div>
        <span class="logo-text">GitAgent</span>
      </div>
      <div class="status-pill">
        <div class="status-dot"></div>
        Gemini · Online
      </div>
    </header>

    <div class="hero">
      <div class="hero-tag">✦ Git-Native AI Agent</div>
      <h1>Ask me anything</h1>
      <p>Powered by Gemini AI · Defined in your Git repo · Always ready</p>
    </div>

    <div class="chat-wrapper">
      <div id="chat">
        <div class="welcome">
          <div class="chips">
            <div class="chip" onclick="sendChip(this)">What can you do?</div>
            <div class="chip" onclick="sendChip(this)">Explain gitagent</div>
            <div class="chip" onclick="sendChip(this)">How does gitclaw work?</div>
            <div class="chip" onclick="sendChip(this)">Help me with my project</div>
          </div>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-container">
        <input type="text" id="prompt" placeholder="Ask me anything…" autocomplete="off"/>
        <button id="send-btn" onclick="ask()" title="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="hint">Press Enter to send · Built with gitagent + Gemini</p>
    </div>

    <script>
      // Configure marked for safe rendering
      marked.setOptions({
        breaks: true,       // line breaks become <br>
        gfm: true,          // GitHub flavored markdown
      });

      const chat = document.getElementById("chat");
      const input = document.getElementById("prompt");
      const btn = document.getElementById("send-btn");

      function appendMsg(role, text) {
        const isAgent = role === "agent";
        const div = document.createElement("div");
        div.className = `msg ${role}`;

        // Render markdown only for agent responses
        const content = isAgent
          ? marked.parse(text)
          : text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); // sanitize user input

        div.innerHTML = `
          <div class="avatar ${role}">${isAgent ? "🤖" : "U"}</div>
          <div class="bubble">
            <div class="sender">${isAgent ? "GitAgent" : "You"}</div>
            <div class="content">${content}</div>
          </div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
      }

      function showTyping() {
        const div = document.createElement("div");
        div.className = "msg agent";
        div.id = "typing";
        div.innerHTML = `
          <div class="avatar agent">🤖</div>
          <div class="bubble">
            <div class="typing-dots"><span></span><span></span><span></span></div>
          </div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
      }

      function sendChip(el) {
        input.value = el.textContent;
        el.closest(".welcome")?.remove();
        ask();
      }

      async function ask() {
        const prompt = input.value.trim();
        if (!prompt) return;

        input.value = "";
        btn.disabled = true;
        appendMsg("user", prompt);
        showTyping();

        try {
          const res = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt }),
          });

          const data = await res.json();
          removeTyping();

          if (data.error) {
            appendMsg("agent", "⚠️ " + data.error);
          } else {
            appendMsg("agent", data.answer || "No response received.");
          }
        } catch (err) {
          removeTyping();
          appendMsg("agent", "⚠️ Connection error: " + err.message);
        } finally {
          btn.disabled = false;
          input.focus();
        }
      }

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") ask();
      });
    </script>
  </body>
</html>
