<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Hackathon Agent</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 75%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #response {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
      min-height: 50px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>🤖 My Hackathon Agent</h1>

  <input type="text" id="prompt" placeholder="Ask me anything..." />
  <button onclick="ask()">Send</button>

  <div id="response">Response will appear here...</div>

  <script>
    async function ask() {
      const prompt = document.getElementById('prompt').value;
      const responseDiv = document.getElementById('response');

      if (!prompt) {
        responseDiv.innerText = "Please enter a question.";
        return;
      }

      responseDiv.innerText = "Thinking...";

      try {
        // ✅ Call YOUR backend (NOT Gemini directly)
        const res = await fetch('/ask', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        console.log("Backend response:", data);

        // ✅ Handle errors safely
        if (data.error) {
          responseDiv.innerText = "Error: " + data.error;
        } else {
          responseDiv.innerText = data.answer || "No response received.";
        }

      } catch (err) {
        responseDiv.innerText = "Error: " + err.message;
      }
    }

    // ✅ Press Enter to send
    document.getElementById('prompt').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        ask();
      }
    });
  </script>

</body>
</html>
